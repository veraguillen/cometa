# ──────────────────────────────────────────────────────────────────────────────
# Google Cloud Build — CI/CD para Cometa Vault
#
# Trigger: push a la rama `master` (GitHub → Cloud Build trigger)
#
# Variables de sustitución — todas configurables en la UI del trigger.
# Los valores por defecto aquí son los de producción (cometa-mvp).
#
# Secrets necesarios en Secret Manager (crear una sola vez):
#   cometa-gcp-credentials  → contenido completo del SA JSON (cometa_key.json)
#   cometa-jwt-secret       → string aleatorio ≥ 32 chars para HS256
#   cometa-resend-key       → API key de Resend (email transaccional)
#
# Credenciales en Cloud Run:
#   El backend usa GCP_SERVICE_ACCOUNT_JSON inyectado desde Secret Manager.
#   Si la variable no está, cae a Application Default Credentials (SA adjunta al servicio).
# ──────────────────────────────────────────────────────────────────────────────

substitutions:
  # ── Infraestructura ───────────────────────────────────────────────────────────
  _REGION:           us-central1
  _REPO:             cometa-vault                       # Artifact Registry repo
  _BACKEND_SERVICE:  cometa-vault                       # Cloud Run service name
  _FRONTEND_SERVICE: cometa-vault-frontend
  _SA_EMAIL:         cometa-vault-sa@cometa-mvp.iam.gserviceaccount.com

  # ── URLs públicas ─────────────────────────────────────────────────────────────
  # _NEXT_PUBLIC_API_URL es estable: no cambia a menos que se borre el servicio.
  _NEXT_PUBLIC_API_URL:  https://cometa-vault-92572839783.us-central1.run.app
  _ALLOWED_ORIGINS:      https://cometa-vault-frontend-92572839783.us-central1.run.app

  # ── OAuth — Google Identity Services ─────────────────────────────────────────
  # Mismo Client ID para backend (verificación token) y frontend (botón GIS).
  _NEXT_PUBLIC_GOOGLE_CLIENT_ID: 92572839783-7ot0oqfemmbah7mubirkee631fl7h8lm.apps.googleusercontent.com

  # ── GCS Buckets — Medallion Architecture ─────────────────────────────────────
  _GCS_RAW_BUCKET:         cometa-vc-raw-prod     # Archivos originales (PDF/Excel)
  _GCS_STAGE_BUCKET:       cometa-vc-stage-prod   # JSON Gemini + intermedios
  _GCS_GOLD_BUCKET:        cometa-vc-gold-prod    # KPIs certificados
  _HISTORICOFUND_BUCKET:   historicofund          # CSV histórico del fondo

  # ── BigQuery ──────────────────────────────────────────────────────────────────
  _BIGQUERY_DATASET: BD_Cometa

  # ── Document AI / Vertex ─────────────────────────────────────────────────────
  _DOCUMENT_AI_PROCESSOR_ID: c5e1adfde68e63cf

  # ── Email ─────────────────────────────────────────────────────────────────────
  _EMAIL_FROM: onboarding@cometa.vc

  # ── Dashboard Looker Studio ───────────────────────────────────────────────────
  _DASHBOARD_URL: https://datastudio.google.com/reporting/99155726-349c-440c-81eb-9a199120b5f6

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # ── 1. Build imagen del Backend ───────────────────────────────────────────────
  # Contexto: raíz del repo  |  Dockerfile: ./Dockerfile (Python/FastAPI)
  # No requiere cometa_key.json — usa GCP_SERVICE_ACCOUNT_JSON (Secret Manager)
  # o Application Default Credentials si la SA está adjunta al servicio Cloud Run.
  - name: gcr.io/cloud-builders/docker
    id: build-backend
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:latest
      - --file
      - Dockerfile
      - .

  # ── 2. Build imagen del Frontend ──────────────────────────────────────────────
  # Contexto: ./frontend/   |  Dockerfile: ./frontend/Dockerfile (Node/Next.js)
  # NEXT_PUBLIC_* se incrustan en el bundle estático en el momento del build —
  # no se leen como env vars en runtime por Next.js.
  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/frontend:latest
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}
      - --build-arg
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${_NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      - --file
      - frontend/Dockerfile
      - frontend/

  # ── 3. Push Backend ───────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-backend
    waitFor: [build-backend]
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:latest

  # ── 4. Push Frontend ──────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-frontend
    waitFor: [build-frontend]
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/frontend:latest

  # ── 5. Deploy Backend → Cloud Run ────────────────────────────────────────────
  # GCP_SERVICE_ACCOUNT_JSON se inyecta desde Secret Manager — el contenedor
  # nunca necesita cometa_key.json. Si el secret no existe, usa ADC (SA adjunta).
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-backend
    waitFor: [push-backend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_BACKEND_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:latest
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_SA_EMAIL}
      - --allow-unauthenticated
      - --port=8080
      - --cpu=1
      - --memory=2Gi
      - --min-instances=0
      - --max-instances=10
      - --concurrency=10
      - --timeout=300
      - --set-env-vars=GOOGLE_PROJECT_ID=${PROJECT_ID},GCS_INPUT_BUCKET=${_GCS_RAW_BUCKET},GCS_OUTPUT_BUCKET=${_GCS_STAGE_BUCKET},GCS_RAW_BUCKET=${_GCS_RAW_BUCKET},GCS_STAGE_BUCKET=${_GCS_STAGE_BUCKET},BUCKET_GOLD=${_GCS_GOLD_BUCKET},HISTORICOFUND_BUCKET=${_HISTORICOFUND_BUCKET},GOOGLE_BIGQUERY_DATASET=${_BIGQUERY_DATASET},BIGQUERY_DATASET=${_BIGQUERY_DATASET},DOCUMENT_AI_PROCESSOR_ID=${_DOCUMENT_AI_PROCESSOR_ID},DOCUMENT_AI_LOCATION=us,VERTEX_AI_LOCATION=us-central1,GEMINI_MODEL=gemini-2.5-flash,GOOGLE_CLIENT_ID=${_NEXT_PUBLIC_GOOGLE_CLIENT_ID},EMAIL_FROM=${_EMAIL_FROM},EMAIL_FROM_NAME=Cometa Vault,DASHBOARD_URL=${_DASHBOARD_URL},SKIP_ORIGIN_CHECK=false,ALLOWED_ORIGINS=${_ALLOWED_ORIGINS}
      - --set-secrets=GCP_SERVICE_ACCOUNT_JSON=cometa-gcp-credentials:latest,JWT_SECRET=cometa-jwt-secret:latest,RESEND_API_KEY=cometa-resend-key:latest

  # ── 6. Deploy Frontend → Cloud Run ───────────────────────────────────────────
  # NEXT_PUBLIC_* ya están baked en la imagen (paso 2). Las env vars de Cloud Run
  # solo afectan variables no-públicas (server-side) si las hubiera en el futuro.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-frontend
    waitFor: [push-frontend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/frontend:latest
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --cpu=1
      - --memory=1Gi
      - --min-instances=0
      - --max-instances=5
      - --concurrency=80

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:latest
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/frontend:latest
