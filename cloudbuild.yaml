# ──────────────────────────────────────────────────────────────────────────────
# Google Cloud Build — Cometa Vault CI/CD
#
# Trigger: push a la rama `master`
#
# Imágenes:
#   gcr.io/$PROJECT_ID/cometa-backend:latest  ← FastAPI  (./Dockerfile)
#   gcr.io/$PROJECT_ID/cometa-frontend:latest ← Next.js  (./frontend/Dockerfile)
#
# Servicios Cloud Run:
#   cometa-backend        ← API FastAPI
#   cometa-vault-frontend ← Next.js standalone
#
# Secrets en Secret Manager (crear una sola vez):
#   cometa-gcp-credentials → SA JSON completo
#   cometa-jwt-secret      → string aleatorio ≥ 32 chars
#   cometa-resend-key      → API key de Resend
# ──────────────────────────────────────────────────────────────────────────────

substitutions:
  _SA_EMAIL: cometa-vault-sa@cometa-mvp.iam.gserviceaccount.com

  # URL pública del backend — actualizar si se recrea el servicio cometa-backend
  _NEXT_PUBLIC_API_URL: https://cometa-backend-92572839783.us-central1.run.app
  _ALLOWED_ORIGINS:     https://cometa-vault-frontend-92572839783.us-central1.run.app

  # Google OAuth Client ID — mismo valor para backend y frontend
  _NEXT_PUBLIC_GOOGLE_CLIENT_ID: 92572839783-7ot0oqfemmbah7mubirkee631fl7h8lm.apps.googleusercontent.com

  # GCS Buckets
  _GCS_RAW_BUCKET:       cometa-vc-raw-prod
  _GCS_STAGE_BUCKET:     cometa-vc-stage-prod
  _GCS_GOLD_BUCKET:      cometa-vc-gold-prod
  _HISTORICOFUND_BUCKET: historicofund

  # BigQuery
  _BIGQUERY_DATASET: BD_Cometa

  # Document AI
  _DOCUMENT_AI_PROCESSOR_ID: c5e1adfde68e63cf

  # Email
  _EMAIL_FROM: onboarding@cometa.vc

  # Looker Studio
  _DASHBOARD_URL: https://datastudio.google.com/reporting/99155726-349c-440c-81eb-9a199120b5f6

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:

  # ── PASO 1: Build Backend (FastAPI) ───────────────────────────────────────────
  # Dockerfile: ./Dockerfile  |  Contexto: raíz del repo
  - name: gcr.io/cloud-builders/docker
    id: build-backend
    args:
      - build
      - --tag
      - gcr.io/$PROJECT_ID/cometa-backend:latest
      - --file
      - Dockerfile
      - .

  # ── PASO 2: Build Frontend (Next.js standalone) ───────────────────────────────
  # Dockerfile: ./frontend/Dockerfile  |  Contexto: ./frontend/
  # NEXT_PUBLIC_* se incrustan en el bundle en tiempo de build; no se leen en runtime.
  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    args:
      - build
      - --tag
      - gcr.io/$PROJECT_ID/cometa-frontend:latest
      - --file
      - frontend/Dockerfile
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}
      - --build-arg
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${_NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      - --build-arg
      - NEXT_PUBLIC_LOOKER_URL=${_NEXT_PUBLIC_LOOKER_URL}
      - frontend/

  # ── PASO 3: Push Backend ──────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-backend
    waitFor: [build-backend]
    args:
      - push
      - gcr.io/$PROJECT_ID/cometa-backend:latest

  # ── PASO 4: Push Frontend ─────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-frontend
    waitFor: [build-frontend]
    args:
      - push
      - gcr.io/$PROJECT_ID/cometa-frontend:latest

  # ── PASO 5: Deploy Backend → servicio cometa-backend ─────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-backend
    waitFor: [push-backend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - cometa-backend
      - --image=gcr.io/$PROJECT_ID/cometa-backend:latest
      - --region=us-central1
      - --platform=managed
      - --service-account=${_SA_EMAIL}
      - --allow-unauthenticated
      - --port=8080
      - --cpu=1
      - --memory=2Gi
      - --min-instances=0
      - --max-instances=10
      - --concurrency=10
      - --timeout=300
      - --set-env-vars=GOOGLE_PROJECT_ID=$PROJECT_ID,GCS_INPUT_BUCKET=${_GCS_RAW_BUCKET},GCS_OUTPUT_BUCKET=${_GCS_STAGE_BUCKET},GCS_RAW_BUCKET=${_GCS_RAW_BUCKET},GCS_STAGE_BUCKET=${_GCS_STAGE_BUCKET},BUCKET_GOLD=${_GCS_GOLD_BUCKET},HISTORICOFUND_BUCKET=${_HISTORICOFUND_BUCKET},GOOGLE_BIGQUERY_DATASET=${_BIGQUERY_DATASET},BIGQUERY_DATASET=${_BIGQUERY_DATASET},DOCUMENT_AI_PROCESSOR_ID=${_DOCUMENT_AI_PROCESSOR_ID},DOCUMENT_AI_LOCATION=us,VERTEX_AI_LOCATION=us-central1,GEMINI_MODEL=gemini-2.5-flash,GOOGLE_CLIENT_ID=${_NEXT_PUBLIC_GOOGLE_CLIENT_ID},EMAIL_FROM=${_EMAIL_FROM},EMAIL_FROM_NAME=Cometa Vault,DASHBOARD_URL=${_DASHBOARD_URL},SKIP_ORIGIN_CHECK=false,ALLOWED_ORIGINS=${_ALLOWED_ORIGINS}
      - --set-secrets=GCP_SERVICE_ACCOUNT_JSON=cometa-gcp-credentials:latest,JWT_SECRET=cometa-jwt-secret:latest,RESEND_API_KEY=cometa-resend-key:latest

  # ── PASO 6: Deploy Frontend → servicio cometa-vault-frontend ─────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-frontend
    waitFor: [push-frontend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - cometa-vault-frontend
      - --image=gcr.io/$PROJECT_ID/cometa-frontend:latest
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --cpu=1
      - --memory=1Gi
      - --min-instances=0
      - --max-instances=5
      - --concurrency=80

images:
  - gcr.io/$PROJECT_ID/cometa-backend:latest
  - gcr.io/$PROJECT_ID/cometa-frontend:latest
